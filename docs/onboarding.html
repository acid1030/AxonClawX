<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AxonClaw - 欢迎使用</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-8">
  <div class="max-w-2xl w-full">
    <!-- 进度条 -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-muted" id="step-indicator">步骤 1/5</span>
        <span class="text-sm text-muted" id="step-name">欢迎</span>
      </div>
      <div class="h-1 bg-[#2c2c2e] rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-blue-500 to-purple-600 transition-all duration-300" id="progress-bar" style="width: 20%"></div>
      </div>
    </div>

    <!-- Step 1: 欢迎 -->
    <div id="step-1" class="step">
      <div class="text-center py-12">
        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-4xl font-bold mx-auto mb-6">A</div>
        <h1 class="text-3xl font-bold mb-4">欢迎使用 AxonClaw</h1>
        <p class="text-muted text-lg mb-8">AI 驱动的全渠道智能运营平台</p>
        <p class="text-muted mb-8">让我们花 2 分钟完成初始设置</p>
        <button onclick="nextStep()" class="px-8 py-3 bg-[#0a84ff] hover:bg-[#0070e0] rounded-lg font-medium transition">
          开始设置
        </button>
      </div>
    </div>

    <!-- Step 2: Gateway 配置 -->
    <div id="step-2" class="step hidden">
      <h2 class="text-2xl font-bold mb-6">配置 Gateway</h2>
      <div class="bg-[#2c2c2e] rounded-xl p-6 border border-[#3a3a3c] mb-6">
        <p class="text-sm text-muted mb-4">Gateway 是 AxonClaw 与 AI Agent 通信的桥梁</p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm mb-2">Gateway 地址</label>
            <input type="text" id="gateway-url" value="ws://127.0.0.1:18789" 
              class="w-full px-4 py-2 bg-[#1c1c1e] border border-[#3a3a3c] rounded-lg focus:outline-none focus:border-[#0a84ff]">
          </div>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="auto-start" checked class="rounded">
            <label for="auto-start" class="text-sm">自动启动 Gateway</label>
          </div>
        </div>
      </div>
      <div class="flex justify-between">
        <button onclick="prevStep()" class="px-6 py-2 bg-[#2c2c2e] hover:bg-[#3a3a3c] rounded-lg transition">上一步</button>
        <button onclick="nextStep()" class="px-6 py-2 bg-[#0a84ff] hover:bg-[#0070e0] rounded-lg font-medium transition">下一步</button>
      </div>
    </div>

    <!-- Step 3: 选择模型 -->
    <div id="step-3" class="step hidden">
      <h2 class="text-2xl font-bold mb-6">选择 AI 模型</h2>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <label class="cursor-pointer">
          <input type="radio" name="model" value="glm-5" checked class="peer sr-only">
          <div class="p-4 bg-[#2c2c2e] border border-[#3a3a3c] rounded-xl peer-checked:border-[#0a84ff] peer-checked:bg-[#0a84ff]/10 transition">
            <div class="text-lg font-semibold mb-1">GLM-5</div>
            <div class="text-sm text-muted">智谱 AI，中文优秀</div>
          </div>
        </label>
        <label class="cursor-pointer">
          <input type="radio" name="model" value="gpt-4" class="peer sr-only">
          <div class="p-4 bg-[#2c2c2e] border border-[#3a3a3c] rounded-xl peer-checked:border-[#0a84ff] peer-checked:bg-[#0a84ff]/10 transition">
            <div class="text-lg font-semibold mb-1">GPT-4</div>
            <div class="text-sm text-muted">OpenAI，全能选手</div>
          </div>
        </label>
        <label class="cursor-pointer">
          <input type="radio" name="model" value="claude" class="peer sr-only">
          <div class="p-4 bg-[#2c2c2e] border border-[#3a3a3c] rounded-xl peer-checked:border-[#0a84ff] peer-checked:bg-[#0a84ff]/10 transition">
            <div class="text-lg font-semibold mb-1">Claude</div>
            <div class="text-sm text-muted">Anthropic，长文本</div>
          </div>
        </label>
        <label class="cursor-pointer">
          <input type="radio" name="model" value="local" class="peer sr-only">
          <div class="p-4 bg-[#2c2c2e] border border-[#3a3a3c] rounded-xl peer-checked:border-[#0a84ff] peer-checked:bg-[#0a84ff]/10 transition">
            <div class="text-lg font-semibold mb-1">本地模型</div>
            <div class="text-sm text-muted">Ollama，隐私优先</div>
          </div>
        </label>
      </div>
      <div class="flex justify-between">
        <button onclick="prevStep()" class="px-6 py-2 bg-[#2c2c2e] hover:bg-[#3a3a3c] rounded-lg transition">上一步</button>
        <button onclick="nextStep()" class="px-6 py-2 bg-[#0a84ff] hover:bg-[#0070e0] rounded-lg font-medium transition">下一步</button>
      </div>
    </div>

    <!-- Step 4: 创建第一个 Agent -->
    <div id="step-4" class="step hidden">
      <h2 class="text-2xl font-bold mb-6">创建你的第一个 Agent</h2>
      <div class="bg-[#2c2c2e] rounded-xl p-6 border border-[#3a3a3c] mb-6">
        <div class="space-y-4">
          <div>
            <label class="block text-sm mb-2">Agent 名称</label>
            <input type="text" id="agent-name" placeholder="例如：Assistant" 
              class="w-full px-4 py-2 bg-[#1c1c1e] border border-[#3a3a3c] rounded-lg focus:outline-none focus:border-[#0a84ff]">
          </div>
          <div>
            <label class="block text-sm mb-2">角色</label>
            <select id="agent-role" class="w-full px-4 py-2 bg-[#1c1c1e] border border-[#3a3a3c] rounded-lg focus:outline-none focus:border-[#0a84ff]">
              <option value="assistant">通用助手</option>
              <option value="coder">代码开发</option>
              <option value="writer">内容创作</option>
              <option value="analyst">数据分析</option>
            </select>
          </div>
        </div>
      </div>
      <div class="flex justify-between">
        <button onclick="prevStep()" class="px-6 py-2 bg-[#2c2c2e] hover:bg-[#3a3a3c] rounded-lg transition">上一步</button>
        <button onclick="nextStep()" class="px-6 py-2 bg-[#0a84ff] hover:bg-[#0070e0] rounded-lg font-medium transition">下一步</button>
      </div>
    </div>

    <!-- Step 5: 完成 -->
    <div id="step-5" class="step hidden">
      <div class="text-center py-12">
        <div class="w-20 h-20 rounded-full bg-green-500 flex items-center justify-center text-4xl mx-auto mb-6">✓</div>
        <h2 class="text-2xl font-bold mb-4">设置完成！</h2>
        <p class="text-muted mb-8">你的 AxonClaw 已经准备就绪</p>
        
        <div class="bg-[#2c2c2e] rounded-xl p-6 border border-[#3a3a3c] mb-8 text-left">
          <h3 class="font-semibold mb-4">接下来你可以：</h3>
          <ul class="space-y-3 text-sm">
            <li class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full bg-[#0a84ff]/20 text-[#0a84ff] flex items-center justify-center text-xs">1</span>
              <span>与你的 Agent 开始对话</span>
            </li>
            <li class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full bg-[#0a84ff]/20 text-[#0a84ff] flex items-center justify-center text-xs">2</span>
              <span>配置 Channel 连接更多平台</span>
            </li>
            <li class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full bg-[#0a84ff]/20 text-[#0a84ff] flex items-center justify-center text-xs">3</span>
              <span>探索技能市场</span>
            </li>
          </ul>
        </div>
        
        <button onclick="finish()" class="px-8 py-3 bg-[#0a84ff] hover:bg-[#0070e0] rounded-lg font-medium transition">
          开始使用
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 5;

    function updateUI() {
      // 更新步骤指示器
      document.getElementById('step-indicator').textContent = `步骤 ${currentStep}/${totalSteps}`;
      
      // 更新进度条
      const progress = (currentStep / totalSteps) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
      
      // 显示当前步骤
      document.querySelectorAll('.step').forEach(el => el.classList.add('hidden'));
      document.getElementById(`step-${currentStep}`).classList.remove('hidden');
    }

    function nextStep() {
      if (currentStep < totalSteps) {
        currentStep++;
        updateUI();
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        currentStep--;
        updateUI();
      }
    }

    function finish() {
      // 保存配置
      const config = {
        gateway: document.getElementById('gateway-url').value,
        autoStart: document.getElementById('auto-start').checked,
        model: document.querySelector('input[name="model"]:checked').value,
        agent: {
          name: document.getElementById('agent-name').value || 'Assistant',
          role: document.getElementById('agent-role').value
        }
      };
      
      localStorage.setItem('axonclaw-config', JSON.stringify(config));
      
      // 跳转到主界面
      window.location.href = 'demo.html';
    }

    // 初始化
    updateUI();
  </script>
</body>
</html>
