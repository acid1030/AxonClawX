<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AxonClaw - Agent 管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="flex h-screen">
    <!-- 侧边栏 -->
    <aside class="w-[72px] bg-zinc-900 flex flex-col items-center py-4 border-r border-zinc-800">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-bold text-lg mb-6">A</div>
      
      <nav class="flex-1 flex flex-col items-center gap-2">
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="仪表板">📊</button>
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="对话">💬</button>
        <button class="w-10 h-10 rounded-lg bg-indigo-600 text-white flex items-center justify-center" title="Agent管理">🤖</button>
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="Channel">📡</button>
        
        <div class="w-6 h-px bg-zinc-700 my-2"></div>
        
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="记忆">🧠</button>
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="技能">⚡</button>
        <button class="w-10 h-10 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center hover:bg-zinc-700 hover:text-white transition" title="设置">⚙️</button>
      </nav>
      
      <div class="mt-auto flex flex-col items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-500"></div>
        <span class="text-xs text-zinc-500">在线</span>
      </div>
    </aside>
    
    <!-- 主区域 -->
    <main class="flex-1 flex">
      <!-- Agent 列表 -->
      <div class="w-80 border-r border-zinc-800 p-4 overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">Agent 军团</h2>
          <button onclick="openModal()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition">
            + 新建
          </button>
        </div>
        
        <div id="agentList" class="space-y-2">
          <!-- Agent 卡片会动态生成 -->
        </div>
      </div>
      
      <!-- Agent 详情 -->
      <div class="flex-1 p-6" id="agentDetail">
        <div class="flex flex-col items-center justify-center h-full text-zinc-500">
          <div class="text-6xl mb-4">🤖</div>
          <p class="text-lg">选择一个 Agent 查看详情</p>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 创建 Agent 模态框 -->
  <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-2xl w-full max-w-md p-6 border border-zinc-800">
      <h3 class="text-xl font-semibold mb-4">创建 Agent</h3>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">名称</label>
          <input type="text" id="agentName" placeholder="给 Agent 起个名字" 
            class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-indigo-500">
        </div>
        
        <div>
          <label class="block text-sm text-zinc-400 mb-1">角色</label>
          <select id="agentRole" class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-indigo-500">
            <option value="strategist">战略执行官 (NEXUS)</option>
            <option value="product">产品架构师 (ARIA)</option>
            <option value="engineering">工程总管 (KAEL)</option>
            <option value="fullstack">全栈开发 (ZARA)</option>
            <option value="backend">后端架构师 (DANTE)</option>
            <option value="designer">交互设计师 (LUNA)</option>
            <option value="devops">运维指挥官 (ATLAS)</option>
            <option value="qa">质量守门员 (REX)</option>
            <option value="security">安全架构师 (CIPHER)</option>
            <option value="frontend">前端专家 (BLAZE)</option>
            <option value="custom">自定义角色</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm text-zinc-400 mb-1">专业领域</label>
          <input type="text" id="agentSpecialty" placeholder="例如：前端开发、API设计" 
            class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-indigo-500">
        </div>
        
        <div>
          <label class="block text-sm text-zinc-400 mb-1">人格设定</label>
          <textarea id="agentSoul" placeholder="描述 Agent 的性格、工作风格..." rows="3"
            class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:border-indigo-500 resize-none"></textarea>
        </div>
      </div>
      
      <div class="flex justify-end gap-3 mt-6">
        <button onclick="closeModal()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm transition">取消</button>
        <button onclick="createAgent()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition">创建</button>
      </div>
    </div>
  </div>

  <script>
    // 初始 Agent 数据
    let agents = [
      { id: 1, name: 'AXON', role: '至高意志', status: 'busy', specialty: '项目协调', task: '项目协调' },
      { id: 2, name: 'NEXUS', role: '战略', status: 'idle', specialty: '战略决策', task: null },
      { id: 3, name: 'ARIA', role: '产品', status: 'busy', specialty: '产品规划', task: '需求设计' },
      { id: 4, name: 'KAEL', role: '工程', status: 'busy', specialty: '技术架构', task: '架构评审' },
      { id: 5, name: 'ZARA', role: '全栈', status: 'busy', specialty: '全栈开发', task: 'Agent界面' },
      { id: 6, name: 'DANTE', role: '后端', status: 'busy', specialty: '后端架构', task: 'API开发' },
      { id: 7, name: 'LUNA', role: '设计', status: 'busy', specialty: '交互设计', task: 'UI设计' },
      { id: 8, name: 'BLAZE', role: '前端', status: 'busy', specialty: '前端组件', task: '组件开发' },
    ];

    let selectedAgent = null;

    // 渲染 Agent 列表
    function renderAgents() {
      const container = document.getElementById('agentList');
      container.innerHTML = agents.map(agent => `
        <div onclick="selectAgent(${agent.id})" 
          class="p-3 rounded-xl border cursor-pointer transition ${selectedAgent?.id === agent.id ? 'border-indigo-500 bg-indigo-500/10' : 'border-zinc-800 hover:border-zinc-700 bg-zinc-900'}">
          <div class="flex items-center gap-3">
            <div class="relative">
              <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-semibold">
                ${agent.name[0]}
              </div>
              <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-zinc-900 ${agent.status === 'busy' ? 'bg-green-500' : 'bg-zinc-500'}"></div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-medium">${agent.name}</span>
                <span class="text-xs px-1.5 py-0.5 bg-zinc-800 rounded">${agent.role}</span>
              </div>
              <p class="text-sm text-zinc-500 truncate">${agent.task || '空闲'}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 选择 Agent
    function selectAgent(id) {
      selectedAgent = agents.find(a => a.id === id);
      renderAgents();
      renderDetail();
    }

    // 渲染详情
    function renderDetail() {
      const container = document.getElementById('agentDetail');
      if (!selectedAgent) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center h-full text-zinc-500">
            <div class="text-6xl mb-4">🤖</div>
            <p class="text-lg">选择一个 Agent 查看详情</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="max-w-2xl">
          <div class="flex items-start gap-6 mb-8">
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl font-bold">
              ${selectedAgent.name[0]}
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <h1 class="text-2xl font-bold">${selectedAgent.name}</h1>
                <span class="px-2 py-1 bg-zinc-800 rounded-lg text-sm">${selectedAgent.role}</span>
                <span class="px-2 py-1 ${selectedAgent.status === 'busy' ? 'bg-green-500/20 text-green-400' : 'bg-zinc-800 text-zinc-400'} rounded-lg text-sm">
                  ${selectedAgent.status === 'busy' ? '忙碌' : '空闲'}
                </span>
              </div>
              <p class="text-zinc-400">${selectedAgent.specialty}</p>
            </div>
            <button onclick="deleteAgent(${selectedAgent.id})" class="px-3 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg text-sm transition">
              删除
            </button>
          </div>
          
          <div class="grid grid-cols-2 gap-6">
            <div class="bg-zinc-900 rounded-xl p-4 border border-zinc-800">
              <h3 class="text-sm text-zinc-500 mb-3">当前任务</h3>
              <p class="text-lg">${selectedAgent.task || '无任务'}</p>
            </div>
            <div class="bg-zinc-900 rounded-xl p-4 border border-zinc-800">
              <h3 class="text-sm text-zinc-500 mb-3">状态</h3>
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full ${selectedAgent.status === 'busy' ? 'bg-green-500' : 'bg-zinc-500'}"></div>
                <span class="text-lg">${selectedAgent.status === 'busy' ? '工作中' : '空闲中'}</span>
              </div>
            </div>
          </div>
          
          <div class="mt-6 bg-zinc-900 rounded-xl p-4 border border-zinc-800">
            <h3 class="text-sm text-zinc-500 mb-3">快速操作</h3>
            <div class="flex gap-2">
              <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm transition">分配任务</button>
              <button class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm transition">查看日志</button>
              <button class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm transition">编辑配置</button>
            </div>
          </div>
        </div>
      `;
    }

    // 模态框控制
    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    // 创建 Agent
    function createAgent() {
      const name = document.getElementById('agentName').value || 'New Agent';
      const roleSelect = document.getElementById('agentRole');
      const role = roleSelect.options[roleSelect.selectedIndex].text.split(' ')[0];
      const specialty = document.getElementById('agentSpecialty').value || '待定义';
      
      agents.push({
        id: Date.now(),
        name: name.toUpperCase(),
        role,
        status: 'idle',
        specialty,
        task: null
      });
      
      closeModal();
      renderAgents();
      
      // 清空表单
      document.getElementById('agentName').value = '';
      document.getElementById('agentSpecialty').value = '';
      document.getElementById('agentSoul').value = '';
    }

    // 删除 Agent
    function deleteAgent(id) {
      if (confirm('确定要删除这个 Agent 吗？')) {
        agents = agents.filter(a => a.id !== id);
        selectedAgent = null;
        renderAgents();
        renderDetail();
      }
    }

    // 初始化
    renderAgents();
    renderDetail();
  </script>
</body>
</html>
